name: Build Octopus Linux Raw Disk

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Load Btrfs Kernel Module
        run: |
          sudo modprobe btrfs
          sudo lsmod | grep btrfs

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Step 1: Build the container blueprint image
      - name: Build and push Container image
        run: |
          # Safely downcase the repository name into a local shell variable
          LOWER_IMAGE_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          TAG="${{ env.REGISTRY }}/${LOWER_IMAGE_NAME}:latest"
          
          # Build using standard docker/podman build commands to ensure 
          # local variable pass-through works perfectly
          docker build -t $TAG -f ./Containerfile .
          docker push $TAG
          
          # Pass it to the next step via GITHUB_ENV safely
          echo "FINAL_IMAGE_TAG=$TAG" >> $GITHUB_ENV

      # Step 2: Convert the container into a raw disk image
      - name: Build Raw Disk Image
        uses: osbuild/bootc-image-builder-action@main
        with:
          image: ${{ env.FINAL_IMAGE_TAG }}
          config-file: ./config.toml
          types: raw

      # Step 3: Upload the built raw image so users can download it from GitHub
      - name: Upload Raw Disk Artifact
        uses: actions/upload-artifact@v4
        with:
          name: octopus-linux-raw-disk
          path: ${{ github.workspace }}/output/image/disk.raw
